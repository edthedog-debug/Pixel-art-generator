<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelMind - AI Art Generator</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #1a1a2e;
            --surface2: #222240;
            --text: #e8e8f0;
            --text2: #9898b0;
            --accent: #6c5ce7;
            --accent2: #a855f7;
            --border: #2a2a40;
            --danger: #ef4444;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            text-align: center;
            padding: 32px 20px 8px;
        }

        .logo {
            font-size: 2.4em;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .tagline {
            color: var(--text2);
            font-size: 0.95em;
            font-weight: 500;
        }

        .search-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            backdrop-filter: blur(20px);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }

        #themeInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 16px;
            color: var(--text);
            font-size: 1.05em;
            font-family: inherit;
            outline: none;
            letter-spacing: -0.2px;
        }

        #themeInput::placeholder {
            color: #5a5a7a;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: -0.2px;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-generate:active {
            transform: scale(0.97);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-icon {
            font-size: 1.2em;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .suggestion-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .suggestion-chip:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: none;
            animation: fadeInUp 0.4s ease;
        }

        .result-card.visible {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .canvas-wrapper {
            position: relative;
            background: #0d0d1a;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .canvas-inner {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            line-height: 0;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            height: auto;
        }

        .art-meta {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .art-title {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--text);
            letter-spacing: -0.2px;
            text-transform: capitalize;
        }

        .art-details {
            color: var(--text2);
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: var(--accent2);
            font-weight: 600;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 15, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: var(--radius);
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(108, 92, 231, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text2);
            font-size: 0.9em;
            font-weight: 500;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9em;
            display: none;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 500px) {
            .input-wrapper {
                flex-direction: column;
                gap: 8px;
                background: transparent;
                padding: 0;
            }
            
            #themeInput {
                background: var(--surface2);
                border-radius: var(--radius-sm);
                width: 100%;
            }
            
            .btn-generate {
                width: 100%;
                justify-content: center;
            }
            
            .logo {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">PixelMind</div>
            <p class="tagline">Describe anything • AI creates unique pixel art</p>
        </div>

        <div class="search-card">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="themeInput" 
                    placeholder="Describe your pixel art... (e.g., 'a haunted castle at midnight')"
                    maxlength="120"
                    autocomplete="off"
                >
                <button class="btn-generate" id="generateBtn">
                    <span class="btn-icon">✨</span> Generate
                </button>
            </div>
            <div class="suggestions">
                <span class="suggestion-chip" data-theme="scary monster with sharp teeth">👹 Scary monster</span>
                <span class="suggestion-chip" data-theme="beautiful sunset over mountains">🌅 Mountain sunset</span>
                <span class="suggestion-chip" data-theme="futuristic cyberpunk city">🤖 Cyberpunk city</span>
                <span class="suggestion-chip" data-theme="ancient egyptian pyramid">🏛️ Egyptian pyramid</span>
                <span class="suggestion-chip" data-theme="cute cat with big eyes">🐱 Cute cat</span>
                <span class="suggestion-chip" data-theme="magical dragon breathing fire">🐉 Fire dragon</span>
            </div>
        </div>

        <div class="error-message" id="errorMessage">
            ⚠️ Please enter a theme or description to generate pixel art.
        </div>

        <div class="result-card" id="resultCard">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="canvas-inner">
                    <canvas id="pixelCanvas"></canvas>
                </div>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                        <span class="loading-text">Creating pixel art...</span>
                    </div>
                </div>
            </div>
            <div class="art-meta">
                <div>
                    <div class="art-title" id="artTitle">Your creation</div>
                    <div class="art-details">
                        <span>96×96 pixels</span>
                        <span>•</span>
                        <span>16-bit style</span>
                    </div>
                </div>
                <span class="badge" id="styleBadge">AI Generated</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM Elements
            const canvas = document.getElementById('pixelCanvas');
            const ctx = canvas.getContext('2d');
            const themeInput = document.getElementById('themeInput');
            const generateBtn = document.getElementById('generateBtn');
            const resultCard = document.getElementById('resultCard');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const errorMessage = document.getElementById('errorMessage');
            const artTitle = document.getElementById('artTitle');
            const styleBadge = document.getElementById('styleBadge');
            const suggestionChips = document.querySelectorAll('.suggestion-chip');

            // Canvas configuration - High resolution for detail
            const GRID_SIZE = 96;
            const PIXEL_SIZE = 6;
            
            canvas.width = GRID_SIZE * PIXEL_SIZE;
            canvas.height = GRID_SIZE * PIXEL_SIZE;

            // Color palettes for different themes
            const PALETTES = {
                horror: {
                    bg: [8, 3, 15],
                    primary: [140, 20, 30],
                    secondary: [60, 10, 40],
                    accent: [220, 40, 20],
                    highlight: [255, 200, 50],
                    shadow: [20, 5, 25]
                },
                fantasy: {
                    bg: [15, 15, 50],
                    primary: [80, 60, 140],
                    secondary: [40, 80, 60],
                    accent: [220, 180, 60],
                    highlight: [255, 240, 200],
                    shadow: [20, 20, 40]
                },
                nature: {
                    bg: [100, 160, 220],
                    primary: [34, 139, 34],
                    secondary: [60, 100, 40],
                    accent: [255, 200, 50],
                    highlight: [255, 255, 200],
                    shadow: [20, 60, 20]
                },
                scifi: {
                    bg: [5, 5, 30],
                    primary: [60, 80, 180],
                    secondary: [30, 40, 80],
                    accent: [0, 200, 255],
                    highlight: [200, 240, 255],
                    shadow: [10, 10, 30]
                },
                cyberpunk: {
                    bg: [10, 3, 20],
                    primary: [200, 40, 120],
                    secondary: [40, 10, 60],
                    accent: [0, 255, 255],
                    highlight: [255, 200, 50],
                    shadow: [15, 5, 25]
                },
                ancient: {
                    bg: [200, 170, 120],
                    primary: [180, 140, 80],
                    secondary: [140, 100, 50],
                    accent: [220, 200, 100],
                    highlight: [255, 240, 200],
                    shadow: [80, 50, 20]
                },
                cute: {
                    bg: [240, 220, 240],
                    primary: [255, 180, 200],
                    secondary: [200, 150, 180],
                    accent: [255, 220, 100],
                    highlight: [255, 255, 255],
                    shadow: [150, 120, 140]
                }
            };

            function detectTheme(text) {
                const lower = text.toLowerCase();
                if (/monster|scary|horror|fear|creepy|demon|ghost|zombie|spooky|dark|evil/i.test(lower)) return 'horror';
                if (/fantasy|magic|dragon|castle|wizard|fairy|knight|sword|elf/i.test(lower)) return 'fantasy';
                if (/nature|forest|mountain|tree|sunset|ocean|river|flower|garden|landscape|sky/i.test(lower)) return 'nature';
                if (/space|sci.fi|spaceship|alien|planet|star|galaxy|ufo|robot|laser/i.test(lower)) return 'scifi';
                if (/cyberpunk|neon|future|dystopian|tech|hacker|digital/i.test(lower)) return 'cyberpunk';
                if (/ancient|pyramid|egypt|temple|ruins|historical|greek|roman/i.test(lower)) return 'ancient';
                if (/cute|cat|dog|kitten|puppy|bunny|animal|sweet|adorable|happy/i.test(lower)) return 'cute';
                return null;
            }

            function hashString(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash |= 0;
                }
                return Math.abs(hash);
            }

            function seededRandom(seed) {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                return (seed >>> 16) / 32767;
            }

            function lerpColor(c1, c2, t) {
                return [
                    Math.round(c1[0] + (c2[0] - c1[0]) * t),
                    Math.round(c1[1] + (c2[1] - c1[1]) * t),
                    Math.round(c1[2] + (c2[2] - c1[2]) * t)
                ];
            }

            function createPixelGrid() {
                return Array.from({ length: GRID_SIZE }, () => 
                    Array.from({ length: GRID_SIZE }, () => [0, 0, 0])
                );
            }

            function isInBounds(x, y) {
                return x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE;
            }

            function drawCircle(grid, cx, cy, radius, color) {
                const r2 = radius * radius;
                const startY = Math.max(0, Math.floor(cy - radius));
                const endY = Math.min(GRID_SIZE - 1, Math.ceil(cy + radius));
                const startX = Math.max(0, Math.floor(cx - radius));
                const endX = Math.min(GRID_SIZE - 1, Math.ceil(cx + radius));
                
                for (let y = startY; y <= endY; y++) {
                    for (let x = startX; x <= endX; x++) {
                        const dx = x - cx;
                        const dy = y - cy;
                        if (dx * dx + dy * dy <= r2) {
                            grid[y][x] = [...color];
                        }
                    }
                }
            }

            function drawEllipse(grid, cx, cy, rx, ry, color) {
                const startY = Math.max(0, Math.floor(cy - ry));
                const endY = Math.min(GRID_SIZE - 1, Math.ceil(cy + ry));
                const startX = Math.max(0, Math.floor(cx - rx));
                const endX = Math.min(GRID_SIZE - 1, Math.ceil(cx + rx));
                
                for (let y = startY; y <= endY; y++) {
                    for (let x = startX; x <= endX; x++) {
                        const dx = (x - cx) / rx;
                        const dy = (y - cy) / ry;
                        if (dx * dx + dy * dy <= 1) {
                            grid[y][x] = [...color];
                        }
                    }
                }
            }

            function drawRect(grid, x1, y1, x2, y2, color) {
                const startX = Math.max(0, Math.min(x1, x2));
                const endX = Math.min(GRID_SIZE - 1, Math.max(x1, x2));
                const startY = Math.max(0, Math.min(y1, y2));
                const endY = Math.min(GRID_SIZE - 1, Math.max(y1, y2));
                
                for (let y = startY; y <= endY; y++) {
                    for (let x = startX; x <= endX; x++) {
                        grid[y][x] = [...color];
                    }
                }
            }

            function drawTriangle(grid, cx, baseY, height, color, pointingUp = true) {
                const topY = pointingUp ? baseY - height : baseY + height;
                const startY = Math.max(0, Math.min(baseY, topY));
                const endY = Math.min(GRID_SIZE - 1, Math.max(baseY, topY));
                
                for (let y = startY; y <= endY; y++) {
                    const progress = pointingUp ? (baseY - y) / height : (y - baseY) / height;
                    const halfWidth = height * progress * 0.6;
                    const startX = Math.max(0, Math.floor(cx - halfWidth));
                    const endX = Math.min(GRID_SIZE - 1, Math.ceil(cx + halfWidth));
                    
                    for (let x = startX; x <= endX; x++) {
                        grid[y][x] = [...color];
                    }
                }
            }

            function drawLine(grid, x1, y1, x2, y2, color, thickness = 1) {
                let x = x1;
                let y = y1;
                const dx = Math.abs(x2 - x1);
                const dy = Math.abs(y2 - y1);
                const sx = x1 < x2 ? 1 : -1;
                const sy = y1 < y2 ? 1 : -1;
                let err = dx - dy;
                
                while (true) {
                    for (let ty = -thickness; ty <= thickness; ty++) {
                        for (let tx = -thickness; tx <= thickness; tx++) {
                            if (isInBounds(x + tx, y + ty)) {
                                grid[y + ty][x + tx] = [...color];
                            }
                        }
                    }
                    
                    if (x === x2 && y === y2) break;
                    const e2 = 2 * err;
                    if (e2 > -dy) { err -= dy; x += sx; }
                    if (e2 < dx) { err += dx; y += sy; }
                }
            }

            function addNoise(grid, seed, intensity = 15) {
                let s = seed;
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        s = (s * 1103515245 + 12345) & 0x7fffffff;
                        const noise = (s >>> 16) / 32767 * intensity - intensity / 2;
                        grid[y][x] = grid[y][x].map(c => Math.max(0, Math.min(255, Math.round(c + noise))));
                    }
                }
            }

            // Scene generators
            function generateHorrorScene(grid, seed, palette) {
                let s = seed;
                // Dark background with gradient
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const t = y / GRID_SIZE;
                        grid[y][x] = lerpColor(palette.bg, palette.shadow, t);
                    }
                }
                
                const cx = GRID_SIZE / 2;
                const cy = GRID_SIZE / 2;
                
                // Monster body
                const bodySize = 22 + (seededRandom(s++) * 15);
                drawEllipse(grid, cx, cy + 5, bodySize, bodySize * 1.3, palette.primary);
                
                // Texture on body
                for (let i = 0; i < 40; i++) {
                    const tx = cx - bodySize + seededRandom(s++) * bodySize * 2;
                    const ty = cy + 5 - bodySize * 1.3 + seededRandom(s++) * bodySize * 2.6;
                    if (isInBounds(Math.round(tx), Math.round(ty))) {
                        grid[Math.round(ty)][Math.round(tx)] = palette.secondary;
                    }
                }
                
                // Eyes - multiple eyes for horror effect
                const eyeCount = 3 + Math.floor(seededRandom(s++) * 4);
                for (let e = 0; e < eyeCount; e++) {
                    const angle = (e / eyeCount) * Math.PI * 2 + seededRandom(s++) * 0.8;
                    const ex = cx + Math.cos(angle) * (bodySize * 0.5);
                    const ey = cy - 5 + Math.sin(angle) * (bodySize * 0.4);
                    
                    drawEllipse(grid, Math.round(ex), Math.round(ey), 5, 5, palette.highlight);
                    drawEllipse(grid, Math.round(ex), Math.round(ey), 2.5, 2.5, [200, 20, 20]);
                    // Bloodshot
                    for (let r = 0; r < 8; r++) {
                        const rx = ex + (seededRandom(s++) - 0.5) * 8;
                        const ry = ey + (seededRandom(s++) - 0.5) * 8;
                        if (isInBounds(Math.round(rx), Math.round(ry))) {
                            grid[Math.round(ry)][Math.round(rx)] = [180, 30, 30];
                        }
                    }
                }
                
                // Mouth with teeth
                const mouthY = cy + bodySize * 0.7;
                const mouthW = bodySize * 0.6;
                drawEllipse(grid, cx, mouthY, mouthW, 8, [30, 5, 5]);
                
                // Teeth
                for (let t = -mouthW + 2; t <= mouthW - 2; t += 3) {
                    const tx = cx + t;
                    const ty = mouthY - 1;
                    if (isInBounds(Math.round(tx), Math.round(ty))) {
                        drawTriangle(grid, Math.round(tx), Math.round(ty), 5, [240, 240, 230], true);
                    }
                    if (isInBounds(Math.round(tx), Math.round(ty + 2))) {
                        drawTriangle(grid, Math.round(tx), Math.round(ty + 3), 5, [240, 240, 230], false);
                    }
                }
                
                // Claws/tentacles
                for (let t = 0; t < 6; t++) {
                    let tx = cx + (seededRandom(s++) - 0.5) * bodySize * 1.5;
                    let ty = cy + bodySize + seededRandom(s++) * 15;
                    const segments = 10 + Math.floor(seededRandom(s++) * 10);
                    
                    for (let i = 0; i < segments; i++) {
                        tx += (seededRandom(s++) - 0.5) * 4;
                        ty += seededRandom(s++) * 3;
                        if (isInBounds(Math.round(tx), Math.round(ty))) {
                            drawCircle(grid, Math.round(tx), Math.round(ty), 2, palette.secondary);
                        }
                    }
                    // Claw tip
                    if (isInBounds(Math.round(tx), Math.round(ty))) {
                        drawCircle(grid, Math.round(tx), Math.round(ty), 2, palette.accent);
                    }
                }
                
                addNoise(grid, s, 10);
            }

            function generateFantasyScene(grid, seed, palette) {
                let s = seed;
                // Sky gradient
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const t = y / GRID_SIZE;
                        grid[y][x] = lerpColor([20, 15, 60], [60, 30, 100], t);
                    }
                }
                
                // Stars
                for (let i = 0; i < 60; i++) {
                    const sx = Math.floor(seededRandom(s++) * GRID_SIZE);
                    const sy = Math.floor(seededRandom(s++) * GRID_SIZE * 0.5);
                    if (isInBounds(sx, sy)) {
                        grid[sy][sx] = palette.highlight;
                        // Twinkle
                        if (seededRandom(s++) > 0.7 && isInBounds(sx + 1, sy)) grid[sy][sx + 1] = palette.highlight;
                        if (seededRandom(s++) > 0.7 && isInBounds(sx, sy + 1)) grid[sy + 1][sx] = palette.highlight;
                    }
                }
                
                // Moon
                drawCircle(grid, GRID_SIZE - 20, 20, 14, palette.highlight);
                drawCircle(grid, GRID_SIZE - 16, 18, 12, palette.bg); // Crescent effect
                
                // Mountains
                for (let m = 0; m < 4; m++) {
                    const mx = 15 + m * 22;
                    const mh = 35 + seededRandom(s++) * 30;
                    const mw = 20 + seededRandom(s++) * 15;
                    
                    for (let y = GRID_SIZE - mh; y < GRID_SIZE; y++) {
                        const progress = (y - (GRID_SIZE - mh)) / mh;
                        const halfW = mw * (1 - progress) * 0.7;
                        const startX = Math.max(0, Math.floor(mx - halfW));
                        const endX = Math.min(GRID_SIZE - 1, Math.ceil(mx + halfW));
                        const shade = lerpColor([50, 40, 70], [30, 25, 40], progress);
                        
                        for (let x = startX; x <= endX; x++) {

                    drawRect(grid, tx - 3, castleBase - castleH - 12, tx + 3, castleBase, [110, 100, 120]);

                        drawRect(grid, tx - 2 + c * 2, castleBase - castleH - 15, tx - 1 + c * 2, castleBase - castleH - 12, [110, 100, 120]);
                    }
                    // Tower roof
                    drawTriangle(grid, tx, castleBase - castleH - 12, 8, [160, 40, 40], true);
                }
                
                // Windows
                for (let w = 0; w < 4; w++) {
                    const wx = castleX - 8 + w * 6;
                    const wy = castleBase - castleH + 10 + w * 8;

                // Gate

                drawEllipse(grid, dx, dy, 12, 6, [60, 20, 20]);

                addNoise(grid, s, 8);
