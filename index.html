<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelMind - AI Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e8e8f0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 20px 10px;
        }

        .logo {
            font-size: 2.8em;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: #9898b0;
            font-size: 0.95em;
            margin-top: 6px;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: #222240;
            border-radius: 12px;
            padding: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #6c5ce7;
        }

        #themeInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 16px;
            color: #e8e8f0;
            font-size: 1.05em;
            font-family: inherit;
            outline: none;
        }

        #themeInput::placeholder {
            color: #5a5a7a;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .select-style {
            background: #222240;
            border: 1px solid #2a2a40;
            color: #e8e8f0;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.9em;
            outline: none;
            cursor: pointer;
            flex: 1;
        }

        .btn {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #222240;
            border: 1px solid #3a3a58;
            color: #e8e8f0;
        }

        .btn-secondary:hover {
            background: #2a2a50;
            box-shadow: none;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .chip {
            background: #222240;
            border: 1px solid #2a2a40;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #9898b0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: #6c5ce7;
            border-color: #6c5ce7;
            color: white;
        }

        .result-card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 20px;
            overflow: hidden;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .canvas-container {
            background: #0d0d1a;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #2a2a40;
            position: relative;
            min-height: 320px;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-width: 100%;
            height: auto;
        }

        .info {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .info-text h3 {
            font-weight: 700;
            font-size: 1.1em;
            text-transform: capitalize;
        }

        .info-text span {
            color: #9898b0;
            font-size: 0.85em;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            background: #222240;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #a855f7;
            font-weight: 600;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            color: #9898b0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(108, 92, 231, 0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        .error-msg {
            color: #ff5555;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9em;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            .input-group {
                flex-direction: column;
                background: transparent;
                padding: 0;
            }
            #themeInput {
                background: #222240;
                border-radius: 12px;
            }
            .controls-row {
                flex-direction: column;
            }
            .info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">PixelMind</div>
            <p class="tagline">Describe any idea • AI creates your pixel art image</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input type="text" id="themeInput" placeholder="e.g., Fire dragon in a night castle..." maxlength="150" autocomplete="off">
                <button class="btn" id="generateBtn">✨ Generate</button>
            </div>

            <div class="controls-row">
                <select id="styleSelect" class="select-style">
                    <option value="pixel_retro">🎮 8-bit Retro Pixel Art</option>
                    <option value="pixel_16bit">🕹️ Detailed 16-bit Pixel Art</option>
                    <option value="cyberpunk">🌆 Cyberpunk Pixel</option>
                    <option value="fantasy">🔮 Epic Fantasy Pixel</option>
                    <option value="anime">🍙 Anime Pixel Art</option>
                </select>
                <select id="sizeSelect" class="select-style">
                    <option value="128">Fine Pixels (128px)</option>
                    <option value="64" selected>Classic Pixels (64px)</option>
                    <option value="32">Retro Pixels (32px)</option>
                </select>
            </div>

            <div class="chips">
                <span class="chip" data-theme="Scary shadow monster">👹 Monster</span>
                <span class="chip" data-theme="Sunset over snowy mountains">🌅 Sunset</span>
                <span class="chip" data-theme="Cyberpunk city with neon lights">🤖 Cyberpunk</span>
                <span class="chip" data-theme="Egyptian pyramid under the stars">🏛️ Pyramid</span>
                <span class="chip" data-theme="Cute cat with a wizard hat">🐱 Wizard Cat</span>
                <span class="chip" data-theme="Dragon breathing blue fire">🐉 Dragon</span>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Creating image with AI... This may take a few seconds.</span>
        </div>

        <div class="result-card" id="resultCard">
            <div class="canvas-container">
                <canvas id="pixelCanvas"></canvas>
            </div>
            <div class="info">
                <div class="info-text">
                    <h3 id="artTitle">Your Creation</h3>
                    <span id="artSubtitle">High resolution render</span>
                </div>
                <div class="actions">
                    <span class="badge">Generative AI</span>
                    <button class="btn btn-secondary" id="downloadBtn">⬇️ Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const themeInput = document.getElementById('themeInput');
        const styleSelect = document.getElementById('styleSelect');
        const sizeSelect = document.getElementById('sizeSelect');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultCard = document.getElementById('resultCard');
        const loading = document.getElementById('loading');
        const artTitle = document.getElementById('artTitle');
        const artSubtitle = document.getElementById('artSubtitle');
        const errorMsg = document.getElementById('errorMsg');
        const chips = document.querySelectorAll('.chip');

        const RENDER_CANVAS_SIZE = 512;
        canvas.width = RENDER_CANVAS_SIZE;
        canvas.height = RENDER_CANVAS_SIZE;

        const STYLE_PROMPTS = {
            pixel_retro: "8-bit pixel art style, sprite art, retro video game aesthetic, clean pixel lines, vibrant retro color palette",
            pixel_16bit: "16-bit SNES style pixel art, detailed pixelated art, vibrant colors, game asset",
            cyberpunk: "cyberpunk pixel art, neon colors, synthwave pixel aesthetic, dark glowing sci-fi atmosphere",
            fantasy: "epic fantasy pixel art, detailed retro game artwork, magical lighting, crisp pixel art style",
            anime: "Japanese anime pixel art style, cute vibrant pixel aesthetic, retro 90s anime video game style"
        };

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = msg ? 'block' : 'none';
        }

        function generateAIImage(userPrompt) {
            if (!userPrompt.trim()) {
                showError('Please enter a description for the image.');
                return;
            }

            showError('');
            generateBtn.disabled = true;
            loading.classList.add('show');
            resultCard.classList.remove('show');

            const styleKey = styleSelect.value;
            const styleModifier = STYLE_PROMPTS[styleKey] || STYLE_PROMPTS.pixel_retro;
            const fullPrompt = `${userPrompt}, ${styleModifier}, high quality pixel art`;
            
            const seed = Math.floor(Math.random() * 1000000);
            const encodedPrompt = encodeURIComponent(fullPrompt);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true&seed=${seed}`;

            const img = new Image();
            img.crossOrigin = "anonymous";

            img.onload = () => {
                const pixelResolution = parseInt(sizeSelect.value, 10) || 64;
                renderPixelatedImage(img, pixelResolution);

                artTitle.textContent = userPrompt;
                artSubtitle.textContent = `Pixel Grid: ${pixelResolution}×${pixelResolution} • Pollinations AI`;
                
                loading.classList.remove('show');
                resultCard.classList.add('show');
                generateBtn.disabled = false;
            };

            img.onerror = () => {
                loading.classList.remove('show');
                generateBtn.disabled = false;
                showError('There was a problem generating the image. Please try again.');
            };

            img.src = imageUrl;
        }

        function renderPixelatedImage(img, pixelGridSize) {
            // Draw onto a small offscreen canvas to force pixelated downsampling
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = pixelGridSize;
            offscreenCanvas.height = pixelGridSize;
            const offscreenCtx = offscreenCanvas.getContext('2d');

            offscreenCtx.drawImage(img, 0, 0, pixelGridSize, pixelGridSize);

            // Scale back up to main canvas disabling smoothing for sharp pixel edges
            ctx.imageSmoothingEnabled = false;
            ctx.mozImageSmoothingEnabled = false;
            ctx.webkitImageSmoothingEnabled = false;
            ctx.msImageSmoothingEnabled = false;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(offscreenCanvas, 0, 0, pixelGridSize, pixelGridSize, 0, 0, canvas.width, canvas.height);
        }

        // Download canvas image
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            const cleanTitle = artTitle.textContent.toLowerCase().replace(/[^a-z0-9]/g, '_');
            link.download = `pixelmind_${cleanTitle || 'art'}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        generateBtn.addEventListener('click', () => generateAIImage(themeInput.value));

        themeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateAIImage(themeInput.value);
        });

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                const theme = chip.dataset.theme;
                themeInput.value = theme;
                generateAIImage(theme);
            });
        });

        // Generate initial image on load
        window.addEventListener('DOMContentLoaded', () => {
            themeInput.value = "Scary shadow monster";
            generateAIImage(themeInput.value);
        });
    </script>
</body>
</html>
