<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelMind - AI Art Generator</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #1a1a2e;
            --surface2: #222240;
            --text: #e8e8f0;
            --text2: #9898b0;
            --accent: #6c5ce7;
            --accent2: #a855f7;
            --border: #2a2a40;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            text-align: center;
            padding: 32px 20px 8px;
        }

        .logo {
            font-size: 2.4em;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .tagline {
            color: var(--text2);
            font-size: 0.95em;
            font-weight: 500;
        }

        .search-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }

        #themeInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 16px;
            color: var(--text);
            font-size: 1.05em;
            font-family: inherit;
            outline: none;
            letter-spacing: -0.2px;
        }

        #themeInput::placeholder {
            color: #5a5a7a;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: -0.2px;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-generate:active {
            transform: scale(0.97);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .suggestion-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .suggestion-chip:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: none;
            animation: fadeInUp 0.4s ease;
        }

        .result-card.visible {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .canvas-wrapper {
            position: relative;
            background: #0d0d1a;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border);
            min-height: 300px;
        }

        .canvas-inner {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            line-height: 0;
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            height: auto;
            width: 576px;
            height: 576px;
        }

        .art-meta {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .art-title {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--text);
            letter-spacing: -0.2px;
            text-transform: capitalize;
        }

        .art-details {
            color: var(--text2);
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            background: var(--surface2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: var(--accent2);
            font-weight: 600;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 15, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: var(--radius);
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(108, 92, 231, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text2);
            font-size: 0.9em;
            font-weight: 500;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9em;
            display: none;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 640px) {
            canvas {
                width: 100% !important;
                height: auto !important;
            }
            
            .input-wrapper {
                flex-direction: column;
                gap: 8px;
                background: transparent;
                padding: 0;
            }
            
            #themeInput {
                background: var(--surface2);
                border-radius: var(--radius-sm);
                width: 100%;
            }
            
            .btn-generate {
                width: 100%;
                justify-content: center;
            }
            
            .logo {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">PixelMind</div>
            <p class="tagline">Describe anything • AI creates unique pixel art</p>
        </div>

        <div class="search-card">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="themeInput" 
                    placeholder="Describe your pixel art... (e.g., 'a haunted castle at midnight')"
                    maxlength="120"
                    autocomplete="off"
                >
                <button class="btn-generate" id="generateBtn">
                    ✨ Generate
                </button>
            </div>
            <div class="suggestions">
                <span class="suggestion-chip" data-theme="scary monster with sharp teeth">👹 Scary monster</span>
                <span class="suggestion-chip" data-theme="beautiful sunset over mountains">🌅 Mountain sunset</span>
                <span class="suggestion-chip" data-theme="futuristic cyberpunk city">🤖 Cyberpunk city</span>
                <span class="suggestion-chip" data-theme="ancient egyptian pyramid">🏛️ Egyptian pyramid</span>
                <span class="suggestion-chip" data-theme="cute cat with big eyes">🐱 Cute cat</span>
                <span class="suggestion-chip" data-theme="magical dragon breathing fire">🐉 Fire dragon</span>
            </div>
        </div>

        <div class="error-message" id="errorMessage">
            ⚠️ Please enter a theme or description to generate pixel art.
        </div>

        <div class="result-card" id="resultCard">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="canvas-inner">
                    <canvas id="pixelCanvas"></canvas>
                </div>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                        <span class="loading-text">Creating pixel art...</span>
                    </div>
                </div>
            </div>
            <div class="art-meta">
                <div>
                    <div class="art-title" id="artTitle">Your creation</div>
                    <div class="art-details">
                        <span>96×96 pixels</span>
                        <span>•</span>
                        <span>High detail</span>
                    </div>
                </div>
                <span class="badge" id="styleBadge">AI Generated</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('pixelCanvas');
            const ctx = canvas.getContext('2d');
            const themeInput = document.getElementById('themeInput');
            const generateBtn = document.getElementById('generateBtn');
            const resultCard = document.getElementById('resultCard');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const errorMessage = document.getElementById('errorMessage');
            const artTitle = document.getElementById('artTitle');
            const styleBadge = document.getElementById('styleBadge');
            const suggestionChips = document.querySelectorAll('.suggestion-chip');

            const GRID_SIZE = 96;
            const PIXEL_SIZE = 6;
            
            canvas.width = GRID_SIZE * PIXEL_SIZE;
            canvas.height = GRID_SIZE * PIXEL_SIZE;

            function hashString(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) - hash) + str.charCodeAt(i);
                    hash |= 0;
                }
                return Math.abs(hash);
            }

            function seededRandom(seed) {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                return (seed >>> 16) / 32767;
            }

            function detectTheme(text) {
                const lower = text.toLowerCase();
                if (/monster|scary|horror|fear|creepy|demon|ghost|zombie|spooky|dark|evil|teeth/i.test(lower)) return 'horror';
                if (/fantasy|magic|dragon|castle|wizard|fairy|knight|sword|elf/i.test(lower)) return 'fantasy';
                if (/nature|forest|mountain|tree|sunset|ocean|river|flower|garden|landscape|sky/i.test(lower)) return 'nature';
                if (/space|sci.fi|spaceship|alien|planet|star|galaxy|ufo|robot|laser/i.test(lower)) return 'scifi';
                if (/cyberpunk|neon|future|dystopian|tech|hacker|digital|city/i.test(lower)) return 'cyberpunk';
                if (/ancient|pyramid|egypt|temple|ruins|historical|greek|roman/i.test(lower)) return 'ancient';
                if (/cute|cat|dog|kitten|puppy|bunny|animal|sweet|adorable|happy/i.test(lower)) return 'cute';
                return 'mixed';
            }

            function generatePixelArt(theme, seed) {
                const grid = [];
                for (let y = 0; y < GRID_SIZE; y++) {
                    grid[y] = [];
                    for (let x = 0; x < GRID_SIZE; x++) {
                        grid[y][x] = [0, 0, 0];
                    }
                }

                const themeType = detectTheme(theme);
                let s = seed;

                switch(themeType) {
                    case 'horror':
                        generateHorror(grid, s);
                        break;
                    case 'fantasy':
                        generateFantasy(grid, s);
                        break;
                    case 'nature':
                        generateNature(grid, s);
                        break;
                    case 'scifi':
                        generateSciFi(grid, s);
                        break;
                    case 'cyberpunk':
                        generateCyberpunk(grid, s);
                        break;
                    case 'ancient':
                        generateAncient(grid, s);
                        break;
                    case 'cute':
                        generateCute(grid, s);
                        break;
                    default:
                        generateMixed(grid, s, theme);
                }

                return grid;
            }

            function generateHorror(grid, seed) {
                let s = seed;
                // Dark background
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const shade = 5 + (y / GRID_SIZE) * 20;
                        grid[y][x] = [shade, shade * 0.3, shade * 0.6];
                    }
                }

                const cx = GRID_SIZE / 2;
                const cy = GRID_SIZE / 2;

                // Monster body
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const dx = x - cx;
                        const dy = y - (cy + 5);
                        const dist = Math.sqrt(dx * dx + (dy * 0.7) * (dy * 0.7));
                        if (dist < 22 + seededRandom(s++) * 8) {
                            grid[y][x] = [80 + (seededRandom(s++) * 40), 15, 25];
                        }
                    }
                }

                // Eyes
                const eyeY = cy - 8;
                for (let e = -1; e <= 1; e += 2) {
                    const ex = cx + e * 10;
                    // Eye white
                    for (let y = eyeY - 5; y <= eyeY + 5; y++) {
                        for (let x = ex - 4; x <= ex + 4; x++) {
                            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                                const d = Math.sqrt((x - ex) ** 2 + (y - eyeY) ** 2);
                                if (d <= 4) grid[y][x] = [220, 220, 120];
                            }
                        }
                    }
                    // Pupil
                    for (let y = eyeY - 2; y <= eyeY + 2; y++) {
                        for (let x = ex - 1; x <= ex + 1; x++) {
                            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                                grid[y][x] = [200, 0, 0];
                            }
                        }
                    }
                }

                // Mouth
                const mouthY = cy + 10;
                for (let y = mouthY - 3; y <= mouthY + 4; y++) {
                    for (let x = cx - 12; x <= cx + 12; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            if (Math.abs(x - cx) < 13 - Math.abs(y - mouthY) * 1.5) {
                                grid[y][x] = [150, 0, 0];
                            }
                        }
                    }
                }

                // Teeth
                for (let t = cx - 10; t <= cx + 10; t += 2) {
                    if (t >= 0 && t < GRID_SIZE && mouthY >= 0 && mouthY < GRID_SIZE) {
                        grid[mouthY][t] = [255, 255, 255];
                        if (mouthY + 1 < GRID_SIZE) grid[mouthY + 1][t] = [255, 255, 255];
                    }
                }
            }

            function generateFantasy(grid, seed) {
                let s = seed;
                // Sky
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const t = y / GRID_SIZE;
                        grid[y][x] = [
                            Math.floor(15 + t * 20),
                            Math.floor(10 + t * 25),
                            Math.floor(50 + t * 40)
                        ];
                    }
                }

                // Stars
                for (let i = 0; i < 50; i++) {
                    const sx = Math.floor(seededRandom(s++) * GRID_SIZE);
                    const sy = Math.floor(seededRandom(s++) * GRID_SIZE * 0.5);
                    if (sx >= 0 && sx < GRID_SIZE && sy >= 0 && sy < GRID_SIZE) {
                        grid[sy][sx] = [255, 255, 220];
                    }
                }

                // Moon
                const mx = GRID_SIZE - 20;
                const my = 20;
                for (let y = my - 12; y <= my + 12; y++) {
                    for (let x = mx - 12; x <= mx + 12; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            if (Math.sqrt((x - mx) ** 2 + (y - my) ** 2) <= 12) {
                                grid[y][x] = [255, 250, 200];
                            }
                        }
                    }
                }

                // Castle
                const castleX = GRID_SIZE / 2;
                const baseY = GRID_SIZE - 20;
                for (let y = baseY - 40; y <= baseY; y++) {
                    for (let x = castleX - 15; x <= castleX + 15; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            grid[y][x] = [100, 90, 110];
                        }
                    }
                }

                // Towers
                for (let t = 0; t < 3; t++) {
                    const tx = castleX - 10 + t * 10;
                    for (let y = baseY - 50; y <= baseY; y++) {
                        for (let x = tx - 3; x <= tx + 3; x++) {
                            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                                grid[y][x] = [120, 110, 130];
                            }
                        }
                    }
                    // Tower top
                    for (let y = baseY - 55; y < baseY - 48; y++) {
                        for (let x = tx - 2; x <= tx + 2; x++) {
                            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                                grid[y][x] = [180, 40, 40];
                            }
                        }
                    }
                }
            }

            function generateNature(grid, seed) {
                let s = seed;
                // Sky gradient
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const t = y / GRID_SIZE;
                        grid[y][x] = [
                            Math.floor(100 + t * 50),
                            Math.floor(160 + t * 30),
                            Math.floor(220 - t * 30)
                        ];
                    }
                }

                // Sun
                const sunX = GRID_SIZE - 25;
                const sunY = 20;
                for (let y = sunY - 12; y <= sunY + 12; y++) {
                    for (let x = sunX - 12; x <= sunX + 12; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            if (Math.sqrt((x - sunX) ** 2 + (y - sunY) ** 2) <= 10) {
                                grid[y][x] = [255, 220, 50];
                            }
                        }
                    }
                }

                // Ground
                const groundY = GRID_SIZE - 25;
                for (let y = groundY; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        grid[y][x] = [34, 139, 34];
                    }
                }

                // Trees
                for (let t = 0; t < 6; t++) {
                    const tx = 10 + t * 15;
                    // Trunk
                    for (let y = groundY - 25; y <= groundY; y++) {
                        for (let x = tx - 2; x <= tx + 2; x++) {
                            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                                grid[y][x] = [80, 50, 20];
                            }
                        }
                    }
                    // Leaves
                    const leafY = groundY - 25;
                    for (let y = leafY - 12; y <= leafY + 5; y++) {
                        for (let x = tx - 10; x <= tx + 10; x++) {
                            if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                                const d = Math.sqrt((x - tx) ** 2 + ((y - leafY) * 0.8) ** 2);
                                if (d < 10) {
                                    grid[y][x] = [20, 100 + Math.floor(seededRandom(s++) * 40), 20];
                                }
                            }
                        }
                    }
                }
            }

            function generateSciFi(grid, seed) {
                let s = seed;
                // Space
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        grid[y][x] = [5, 5, 25];
                    }
                }

                // Stars
                for (let i = 0; i < 80; i++) {
                    const sx = Math.floor(seededRandom(s++) * GRID_SIZE);
                    const sy = Math.floor(seededRandom(s++) * GRID_SIZE);
                    if (sx >= 0 && sx < GRID_SIZE && sy >= 0 && sy < GRID_SIZE) {
                        const brightness = 150 + Math.floor(seededRandom(s++) * 105);
                        grid[sy][sx] = [brightness, brightness, brightness];
                    }
                }

                // Planet
                const px = 30;
                const py = 40;
                for (let y = py - 15; y <= py + 15; y++) {
                    for (let x = px - 15; x <= px + 15; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            if (Math.sqrt((x - px) ** 2 + (y - py) ** 2) <= 15) {
                                grid[y][x] = [60, 120, 200];
                            }
                        }
                    }
                }

                // Spaceship
                const sx = GRID_SIZE - 30;
                const sy = GRID_SIZE / 2;
                for (let y = sy - 8; y <= sy + 8; y++) {
                    for (let x = sx - 12; x <= sx + 12; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            if (Math.abs(x - sx) < 13 - Math.abs(y - sy) * 0.6) {
                                grid[y][x] = [180, 180, 200];
                            }
                        }
                    }
                }
                // Engine glow
                for (let y = sy - 3; y <= sy + 3; y++) {
                    for (let x = sx + 8; x <= sx + 15; x++) {
                        if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) {
                            grid[y][x] = [0, 180, 255];
                        }
                    }
                }
            }

            function generateCyberpunk(grid, seed) {
                let s = seed;
                // Dark city
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const shade = 10 + (y / GRID_SIZE) * 20;
                        grid[y][x] = [shade, shade * 0.5, shade];
                    }
                }

                // Buildings
                for (let b = 0; b < 12; b++) {
                    const bx = b * 8;
                    const bh = 30 + Math.floor(seededRandom(s++) * 40);
                    for (let y = GRID_SIZE - bh; y < GRID_SIZE; y++) {
                        for (let x = bx; x < bx + 7; x++) {
                            if (x < GRID_SIZE && y >= 0) {
                                grid[y][x] = [25, 25, 35];
                                // Windows with neon
                                if ((x - bx) % 3 === 1 && (GRID_SIZE - y) % 5 === 1) {
                                    const colors = [[255, 100, 255], [0, 255, 255], [255, 255, 50]];
                                    grid[y][x] = colors[b % 3];
                                }
                            }
                        }
                    }
                }

                // Neon signs
                for (let n = 0; n < 10; n++) {
                    const nx = 5 + n * 9;
                    const ny = 15 + Math.floor(seededRandom(s++) * 40);
                    for (let i = 0; i < 7; i++) {
                        if (nx + i < GRID_SIZE && ny < GRID_SIZE) {
                            const neons = [[255, 0, 255], [0, 255, 255], [255, 255, 0]];
                            grid[ny][nx + i] = neons[n % 3];
                        }
                    }
                }
            }

            function generateAncient(grid, seed) {
                let s = seed;
                // Sand
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const shade = 180 + seededRandom(s++) * 30;
