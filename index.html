<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelMind - AI Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e8e8f0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px 10px;
        }

        .logo {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: #9898b0;
            font-size: 0.95em;
            margin-top: 5px;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 20px;
            padding: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: #222240;
            border-radius: 12px;
            padding: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #6c5ce7;
        }

        #themeInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 16px;
            color: #e8e8f0;
            font-size: 1.05em;
            font-family: inherit;
            outline: none;
        }

        #themeInput::placeholder {
            color: #5a5a7a;
        }

        .btn {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .chip {
            background: #222240;
            border: 1px solid #2a2a40;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #9898b0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: #6c5ce7;
            border-color: #6c5ce7;
            color: white;
        }

        .result-card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 20px;
            overflow: hidden;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .canvas-container {
            background: #0d0d1a;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #2a2a40;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
        }

        .info {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h3 {
            font-weight: 700;
            font-size: 1.1em;
            text-transform: capitalize;
        }

        .info span {
            color: #9898b0;
            font-size: 0.85em;
        }

        .badge {
            background: #222240;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #a855f7;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #9898b0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(108, 92, 231, 0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            .input-group {
                flex-direction: column;
                background: transparent;
                padding: 0;
            }
            #themeInput {
                background: #222240;
                border-radius: 12px;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">PixelMind</div>
            <p class="tagline">Describe anything • AI creates unique pixel art</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input type="text" id="themeInput" placeholder="Describe your pixel art..." maxlength="120" autocomplete="off">
                <button class="btn" id="generateBtn">✨ Generate</button>
            </div>
            <div class="chips">
                <span class="chip" data-theme="scary monster">👹 Monster</span>
                <span class="chip" data-theme="sunset mountains">🌅 Sunset</span>
                <span class="chip" data-theme="cyberpunk city">🤖 Cyberpunk</span>
                <span class="chip" data-theme="egyptian pyramid">🏛️ Pyramid</span>
                <span class="chip" data-theme="cute cat">🐱 Cat</span>
                <span class="chip" data-theme="fire dragon">🐉 Dragon</span>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            Creating pixel art...
        </div>

        <div class="result-card" id="resultCard">
            <div class="canvas-container">
                <canvas id="pixelCanvas"></canvas>
            </div>
            <div class="info">
                <div>
                    <h3 id="artTitle">Your creation</h3>
                    <span>96×96 pixels • High detail</span>
                </div>
                <span class="badge">AI Generated</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const themeInput = document.getElementById('themeInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultCard = document.getElementById('resultCard');
        const loading = document.getElementById('loading');
        const artTitle = document.getElementById('artTitle');
        const chips = document.querySelectorAll('.chip');

        const SIZE = 96;
        const SCALE = 6;
        canvas.width = SIZE * SCALE;
        canvas.height = SIZE * SCALE;

        function hash(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = ((h << 5) - h) + str.charCodeAt(i);
                h |= 0;
            }
            return Math.abs(h);
        }

        function rand(seed) {
            seed = (seed * 1103515245 + 12345) & 0x7fffffff;
            return (seed >>> 16) / 32767;
        }

        function createGrid() {
            const grid = new Array(SIZE);
            for (let y = 0; y < SIZE; y++) {
                grid[y] = new Array(SIZE);
                for (let x = 0; x < SIZE; x++) {
                    grid[y][x] = [0, 0, 0];
                }
            }
            return grid;
        }

        function inBounds(x, y) {
            return x >= 0 && x < SIZE && y >= 0 && y < SIZE;
        }

        function circle(grid, cx, cy, r, color) {
            for (let y = Math.max(0, Math.floor(cy - r)); y <= Math.min(SIZE - 1, Math.ceil(cy + r)); y++) {
                for (let x = Math.max(0, Math.floor(cx - r)); x <= Math.min(SIZE - 1, Math.ceil(cx + r)); x++) {
                    if ((x - cx) ** 2 + (y - cy) ** 2 <= r * r) {
                        grid[y][x] = [...color];
                    }
                }
            }
        }

        function rect(grid, x1, y1, x2, y2, color) {
            const sx = Math.max(0, Math.min(x1, x2));
            const ex = Math.min(SIZE - 1, Math.max(x1, x2));
            const sy = Math.max(0, Math.min(y1, y2));
            const ey = Math.min(SIZE - 1, Math.max(y1, y2));
            for (let y = sy; y <= ey; y++) {
                for (let x = sx; x <= ex; x++) {
                    grid[y][x] = [...color];
                }
            }
        }

        function generate(theme) {
            const grid = createGrid();
            const seed = hash(theme);
            let s = seed;
            const lower = theme.toLowerCase();

            if (/monster|scary|horror|creepy|demon|ghost|dark|evil/i.test(lower)) {
                // HORROR MONSTER
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [5 + y/SIZE*15, 2, 8 + y/SIZE*10];
                    }
                }
                const cx = SIZE/2, cy = SIZE/2;
                // Body
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        const dx = x - cx, dy = (y - cy - 5) * 0.7;
                        if (Math.sqrt(dx*dx + dy*dy) < 20 + rand(s++)*8) {
                            grid[y][x] = [80 + rand(s++)*40, 10, 20];
                        }
                    }
                }
                // Eyes
                for (let e = -1; e <= 1; e += 2) {
                    circle(grid, cx + e*10, cy-8, 5, [220, 220, 100]);
                    circle(grid, cx + e*10, cy-8, 2, [200, 0, 0]);
                }
                // Mouth
                for (let y = cy+8; y <= cy+14; y++) {
                    for (let x = cx-12; x <= cx+12; x++) {
                        if (inBounds(x, y) && Math.abs(x-cx) < 13 - Math.abs(y-cy-11)*1.5) {
                            grid[y][x] = [150, 0, 0];
                        }
                    }
                }
                // Teeth
                for (let t = cx-10; t <= cx+10; t += 2) {
                    if (inBounds(t, cy+10)) grid[cy+10][t] = [255, 255, 255];
                    if (inBounds(t, cy+11)) grid[cy+11][t] = [255, 255, 255];
                }
                // Tentacles
                for (let t = 0; t < 6; t++) {
                    let tx = cx + (rand(s++)-0.5)*25;
                    let ty = cy + 15 + rand(s++)*10;
                    for (let i = 0; i < 12; i++) {
                        tx += (rand(s++)-0.5)*3;
                        ty += rand(s++)*2;
                        if (inBounds(Math.round(tx), Math.round(ty))) {
                            circle(grid, Math.round(tx), Math.round(ty), 2, [50, 15, 40]);
                        }
                    }
                }
            } else if (/fantasy|dragon|castle|magic|wizard|knight/i.test(lower)) {
                // FANTASY CASTLE
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [15 + y/SIZE*20, 10 + y/SIZE*25, 50 + y/SIZE*40];
                    }
                }
                // Stars
                for (let i = 0; i < 50; i++) {
                    const sx = Math.floor(rand(s++)*SIZE);
                    const sy = Math.floor(rand(s++)*SIZE*0.5);
                    if (inBounds(sx, sy)) grid[sy][sx] = [255, 255, 200];
                }
                // Castle
                rect(grid, SIZE/2-15, SIZE-45, SIZE/2+15, SIZE-20, [100, 90, 110]);
                for (let t = 0; t < 3; t++) {
                    const tx = SIZE/2 - 10 + t*10;
                    rect(grid, tx-3, SIZE-55, tx+3, SIZE-20, [120, 110, 130]);
                    rect(grid, tx-2, SIZE-60, tx+2, SIZE-55, [180, 40, 40]);
                }
                // Gate
                rect(grid, SIZE/2-4, SIZE-30, SIZE/2+4, SIZE-20, [40, 30, 20]);
                // Moon
                circle(grid, SIZE-20, 20, 12, [255, 250, 200]);
            } else if (/nature|forest|mountain|tree|sunset|ocean|flower|landscape/i.test(lower)) {
                // NATURE
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [100 + y/SIZE*50, 160 + y/SIZE*30, 220 - y/SIZE*30];
                    }
                }
                circle(grid, SIZE-25, 20, 10, [255, 220, 50]);
                rect(grid, 0, SIZE-25, SIZE-1, SIZE-1, [34, 139, 34]);
                for (let t = 0; t < 6; t++) {
                    const tx = 10 + t*15;
                    rect(grid, tx-2, SIZE-50, tx+2, SIZE-25, [80, 50, 20]);
                    circle(grid, tx, SIZE-50, 12, [20, 120, 20]);
                    circle(grid, tx-5, SIZE-45, 8, [30, 140, 30]);
                    circle(grid, tx+5, SIZE-45, 8, [25, 130, 25]);
                }
            } else if (/space|sci.fi|spaceship|alien|planet|star|galaxy/i.test(lower)) {
                // SCI-FI
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [5, 5, 25];
                    }
                }
                for (let i = 0; i < 80; i++) {
                    const sx = Math.floor(rand(s++)*SIZE);
                    const sy = Math.floor(rand(s++)*SIZE);
                    if (inBounds(sx, sy)) {
                        const b = 150 + Math.floor(rand(s++)*105);
                        grid[sy][sx] = [b, b, b];
                    }
                }
                circle(grid, 30, 40, 15, [60, 120, 200]);
                // Ship
                const sx = SIZE-30, sy = SIZE/2;
                for (let y = sy-8; y <= sy+8; y++) {
                    for (let x = sx-12; x <= sx+12; x++) {
                        if (inBounds(x, y) && Math.abs(x-sx) < 13 - Math.abs(y-sy)*0.6) {
                            grid[y][x] = [180, 180, 200];
                        }
                    }
                }
                for (let y = sy-3; y <= sy+3; y++) {
                    for (let x = sx+8; x <= sx+15; x++) {
                        if (inBounds(x, y)) grid[y][x] = [0, 180, 255];
                    }
                }
            } else if (/cyberpunk|neon|future|city|dystopian/i.test(lower)) {
                // CYBERPUNK
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [10 + y/SIZE*20, 5 + y/SIZE*10, 10 + y/SIZE*15];
                    }
                }
                for (let b = 0; b < 12; b++) {
                    const bx = b*8, bh = 30 + Math.floor(rand(s++)*40);
                    rect(grid, bx, SIZE-bh, bx+7, SIZE-1, [25, 25, 35]);
                    for (let y = SIZE-bh; y < SIZE; y++) {
                        for (let x = bx; x < bx+7; x++) {
                            if ((x-bx)%3 === 1 && (SIZE-y)%5 === 1 && inBounds(x, y)) {
                                grid[y][x] = [[255,0,255],[0,255,255],[255,255,0]][b%3];
                            }
                        }
                    }
                }
            } else if (/ancient|pyramid|egypt|temple/i.test(lower)) {
                // ANCIENT
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [180 + rand(s++)*30, 140 + rand(s++)*20, 90 + rand(s++)*20];
                    }
                }
                for (let y = 0; y < 25; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [100, 140, 200];
                    }
                }
                const px = SIZE/2, py = SIZE-20;
                for (let y = py-40; y <= py; y++) {
                    const w = (py-y)*1.2;
                    for (let x = px-w/2; x <= px+w/2; x++) {
                        if (inBounds(Math.floor(x), y)) grid[y][Math.floor(x)] = [200, 170, 100];
                    }
                }
            } else if (/cute|cat|dog|kitten|puppy|animal/i.test(lower)) {
                // CUTE ANIMAL
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [240, 220, 235];
                    }
                }
                const cx = SIZE/2, cy = SIZE/2;
                circle(grid, cx, cy, 18, [255, 200, 180]);
                for (let e = -1; e <= 1; e += 2) {
                    circle(grid, cx + e*8, cy-3, 5, [255, 255, 255]);
                    circle(grid, cx + e*8, cy-3, 2, [40, 40, 40]);
                    if (inBounds(cx+e*8-2, cy-5)) grid[cy-5][cx+e*8-2] = [255, 255, 255];
                }
                // Smile
                for (let x = cx-5; x <= cx+5; x++) {
                    const my = cy+7 + Math.sin((x-cx)*0.4)*2;
                    if (inBounds(x, Math.floor(my))) grid[Math.floor(my)][x] = [200, 100, 120];
                }
                // Blush
                for (let b = -1; b <= 1; b += 2) {
                    circle(grid, cx + b*11, cy+4, 3, [255, 180, 180]);
                }
                // Ears
                circle(grid, cx-14, cy-14, 6, [255, 200, 180]);
                circle(grid, cx+14, cy-14, 6, [255, 200, 180]);
            } else {
                // ABSTRACT/MIXED
                const h = hash(theme);
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        grid[y][x] = [
                            Math.floor(Math.abs(Math.sin(h + x*0.1 + y*0.15))*200) + 20,
                            Math.floor(Math.abs(Math.cos(h + x*0.08 + y*0.12))*200) + 20,
                            Math.floor(Math.abs(Math.sin(h + x*0.12 + y*0.09))*200) + 20
                        ];
                    }
                }
                for (let i = 0; i < 8; i++) {
                    const sx = Math.floor(rand(s++)*SIZE);
                    const sy = Math.floor(rand(s++)*SIZE);
                    const color = [Math.floor(rand(s++)*255), Math.floor(rand(s++)*255), Math.floor(rand(s++)*255)];
                    circle(grid, sx, sy, 8 + Math.floor(rand(s++)*15), color);
                }
            }

            return grid;
        }

        function render(grid) {
            const imageData = ctx.createImageData(SIZE, SIZE);
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const idx = (y * SIZE + x) * 4;
                    imageData.data[idx] = grid[y][x][0];
                    imageData.data[idx + 1] = grid[y][x][1];
                    imageData.data[idx + 2] = grid[y][x][2];
                    imageData.data[idx + 3] = 255;
                }
            }
            // Scale up
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = SIZE;
            tempCanvas.height = SIZE;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(imageData, 0, 0);
            
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0, SIZE * SCALE, SIZE * SCALE);
        }

        function doGenerate(theme) {
            if (!theme.trim()) return;
            
            loading.classList.add('show');
            resultCard.classList.remove('show');
            
            setTimeout(() => {
                const grid = generate(theme);
                render(grid);
                artTitle.textContent = theme;
                loading.classList.remove('show');
                resultCard.classList.add('show');
            }, 300);
        }

        generateBtn.addEventListener('click', () => doGenerate(themeInput.value));
        
        themeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doGenerate(themeInput.value);
        });

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                const theme = chip.dataset.theme;
                themeInput.value = theme;
                doGenerate(theme);
            });
        });

        // Generate initial art
        setTimeout(() => doGenerate('scary monster'), 500);
    </script>
</body>
</html>
